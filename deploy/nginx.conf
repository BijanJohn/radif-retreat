server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Handle Next.js pages with trailing slash
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    # Handle Next.js static assets
    location /_next/ {
        alias /usr/share/nginx/html/_next/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Handle images with proper MIME types
    location /images/ {
        alias /usr/share/nginx/html/images/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        types {
            image/jpeg jpg jpeg;
            image/png png;
            image/gif gif;
            image/webp webp;
        }
    }

    # Proper error handling
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
